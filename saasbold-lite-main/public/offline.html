<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsBoard Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: Inter, Satoshi, Arial, sans-serif;
        background: #f7faf8;
        color: #111111;
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(460px, 100%);
        background: #ffffff;
        border: 1px solid #dbe7df;
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 18px 40px rgba(17, 17, 17, 0.06);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
      }
      p {
        margin: 0;
        color: #5b655f;
        line-height: 1.6;
      }
      a {
        display: inline-block;
        margin-top: 16px;
        color: #0f5d46;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>You are offline</h1>
        <p>
          WhatsBoard could not reach the internet right now. Reconnect and try
          again to continue with live dashboard data.
        </p>
        <a href="/">Back to Home</a>
      </section>
    </main>
  </body>
</html>
